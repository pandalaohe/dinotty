name: Windows CI (self-hosted)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: http.version
  GIT_CONFIG_VALUE_0: HTTP/1.1

jobs:
  test:
    name: Windows tests (self-hosted)
    runs-on: [self-hosted, Windows]
    defaults:
      run:
        shell: powershell

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Configure Rust toolchain
        run: |
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          if (Test-Path $cargoBin) {
            $env:PATH = "$cargoBin;$env:PATH"
            Add-Content -Path $env:GITHUB_PATH -Value $cargoBin
          }

          if (Get-Command rustup -ErrorAction SilentlyContinue) {
            rustup toolchain install stable --profile minimal
            rustup default stable
          }

          cargo --version
          rustc --version

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        working-directory: frontend
        run: pnpm exec vue-tsc --noEmit

      - name: Test frontend
        working-directory: frontend
        run: pnpm test

      - name: Build frontend assets for Rust tests
        working-directory: frontend
        run: pnpm run build

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Lint Rust
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test Rust workspace
        run: cargo test --workspace --all-targets

      - name: Build server binary
        run: cargo build --bin dinotty-server

      - name: Smoke test Windows server
        run: .\scripts\windows-smoke-test.ps1
