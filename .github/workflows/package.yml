name: Package

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch to package; manual runs only upload Actions artifacts.
        type: choice
        required: true
        default: dev
        options:
          - dev
          - main
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: package-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CI: true
  TAURI_CLI_VERSION: 2.11.4

jobs:
  prepare:
    name: Prepare package metadata
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      should_build: ${{ steps.meta.outputs.should_build }}
      should_release: ${{ steps.meta.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release mode
        id: meta
        shell: bash
        env:
          MANUAL_TARGET_BRANCH: ${{ inputs.target_branch || '' }}
        run: |
          set -euo pipefail

          should_build=true
          should_release=false
          release_tag="${GITHUB_REF_NAME}"
          checkout_ref="${GITHUB_REF}"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            case "${MANUAL_TARGET_BRANCH}" in
              dev|main)
                release_tag="${MANUAL_TARGET_BRANCH}"
                checkout_ref="${MANUAL_TARGET_BRANCH}"
                ;;
              *)
                should_build=false
                echo "::error::Unsupported manual package branch: ${MANUAL_TARGET_BRANCH}"
                ;;
            esac
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            checkout_ref="refs/tags/${GITHUB_REF_NAME}"
            git fetch --no-tags origin main:refs/remotes/origin/main
            tag_commit="$(git rev-list -n 1 "refs/tags/${GITHUB_REF_NAME}")"

            if git merge-base --is-ancestor "${tag_commit}" origin/main; then
              should_release=true
            else
              should_build=false
              echo "::notice::Tag ${GITHUB_REF_NAME} does not point to a commit on origin/main; skipping package and release."
            fi
          fi

          {
            echo "checkout_ref=${checkout_ref}"
            echo "release_tag=${release_tag}"
            echo "should_build=${should_build}"
            echo "should_release=${should_release}"
          } >> "${GITHUB_OUTPUT}"

  package:
    name: Package ${{ matrix.platform }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            bundles: dmg
          - platform: linux
            os: ubuntu-22.04
            bundles: deb,appimage
          - platform: windows
            os: windows-latest
            bundles: nsis

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build desktop packages
        working-directory: src-tauri
        run: pnpm dlx "@tauri-apps/cli@${{ env.TAURI_CLI_VERSION }}" build --bundles ${{ matrix.bundles }} --ci

      - name: Create Windows portable zip
        if: github.event_name == 'workflow_dispatch' && matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $exe = @(
            'target/release/dinotty-desktop.exe',
            'src-tauri/target/release/dinotty-desktop.exe'
          ) | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1

          if (-not $exe) {
            throw 'dinotty-desktop.exe not found'
          }

          $portableRoot = 'target/release/bundle/portable/Dinotty-portable'
          Remove-Item -LiteralPath $portableRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $portableRoot -Force | Out-Null

          Copy-Item -LiteralPath $exe -Destination "$portableRoot/Dinotty.exe"
          @'
          Dinotty Portable

          Double-click Dinotty.exe to start.
          This portable build does not require running an installer.
          Settings and logs are still stored in the normal Dinotty app data directory.
          If the app cannot open, install Microsoft Edge WebView2 Runtime.
          '@ | Set-Content -LiteralPath "$portableRoot/README.txt" -Encoding UTF8

          $zip = 'target/release/bundle/portable/Dinotty-${{ needs.prepare.outputs.release_tag }}-windows-x64-portable.zip'
          Remove-Item -LiteralPath $zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "$portableRoot/*" -DestinationPath $zip -Force

      - name: Upload desktop packages
        uses: actions/upload-artifact@v4
        with:
          name: dinotty-${{ matrix.platform }}
          path: |
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.sig
            target/release/bundle/**/*.tar.gz
            target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.sig
            src-tauri/target/release/bundle/**/*.tar.gz
            src-tauri/target/release/bundle/**/*.zip
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    needs:
      - prepare
      - package
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop packages
        uses: actions/download-artifact@v4
        with:
          pattern: dinotty-*
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Dinotty ${{ needs.prepare.outputs.release_tag }}
          generate_release_notes: true
          files: release-assets/**/*
          fail_on_unmatched_files: true
